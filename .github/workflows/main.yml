name: Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # JOB 1: Testes Unitários
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Run Maven Tests
        run: mvn -pl services/order-service test

  # JOB 2: Build e Push para o Registry
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub # Ou OCI Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/order-service:latest

  # JOB 3: Deploy via SSH na OCI
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_INSTANCE_IP }}
          username: opc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entrar na pasta do projeto
            cd ~/cloud-solutions-project || git clone https://github.com/seu-user/repo.git
            cd ~/cloud-solutions-project

            # 2. Atualizar código e segredos
            git pull origin main
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env

            # 3. Rodar containers
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
