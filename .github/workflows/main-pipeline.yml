name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Aqui você faria o login no Container Registry (Azure ACR ou OCI OCIR)
      # Para o portfólio, podemos simular o build
      - name: Build Order Service
        run: |
          docker build -t order-service:latest ./services/order-service
          
      - name: Build Payment Service
        run: |
          docker build -t payment-service:latest ./services/payment-service

      # Scanner de Segurança (Requisito de Cybersecurity da vaga)
      - name: Run Snyk to check Docker images for vulnerabilities
        uses: snyk/actions/docker@master
        continue-on-error: true # Para não travar o aprendizado, mas mostra que você sabe usar
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}