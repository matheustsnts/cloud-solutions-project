services:
  order-service:
    build: 
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@clouddb_high?TNS_ADMIN=/app/wallet
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./wallet:/app/wallet # Onde ficarão as credenciais do banco OCI

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=oracle+oracledb://admin:${DB_PASSWORD}@clouddb_high